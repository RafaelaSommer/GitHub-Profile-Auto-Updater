name: 🤖 Update README

on:
  schedule:
    - cron: "*/20 7-23 * * *"
  workflow_dispatch:

concurrency:
  group: profile-auto-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install Dependencies
        run: npm install axios luxon dotenv

      - name: 👤 Configurar Git
        run: |
          git config user.name "RafaelaSommer"
          git config user.email "camilaerafaelagoncalves@hotmail.com"

      - name: 🚀 Executar Update
        run: node scripts/update_readme.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}