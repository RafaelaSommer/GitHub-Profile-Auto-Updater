name: 🔥 Profile Auto Update

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: profile-auto
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install deps
        run: npm install

      - name: 🚀 Run updater
        run: |
          echo "Iniciando bot..."
          node scripts/index.js || echo "⚠️ Script falhou mas workflow continua"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧠 Force change (timestamp)
        run: |
          echo $(date) > .last-update

      - name: 💾 Commit & Push
        run: |
          git config user.name "RafaelaSommer"
          git config user.email "camilaerafaelagoncalves@hotmail.com"

          git add .

          git commit --allow-empty -m "🔥 profile update $(date +'%d/%m %H:%M:%S')"

          git push
