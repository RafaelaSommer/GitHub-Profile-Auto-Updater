name: 🤖 Update README

on:
  schedule:
    - cron: "0 8,10,12,14,16,18 * * *"
    - cron: "*/20 8-18 * * *"
  workflow_dispatch:

concurrency:
  group: profile-auto-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: 🚀 Run Profile Updater
        run: npm run update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📅 Generate timestamp (BRT)
        id: time
        run: |
          echo "DATE=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📦 Commit changes
        run: |
          git config --global user.name "RafaelaSommer"
          git config --global user.email "camilaerafaelagoncalves@hotmail.com"

          git add README.md .github/last-run.json

          if git diff --cached --quiet; then
            echo "ℹ️ Nenhuma alteração detectada."
          else
            git commit -m "🤖 Atualização Automática - ${{ steps.time.outputs.DATE }} (BRT)"
            git push
          fi
